<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="現調台帳">
<link rel="manifest" href="manifest.webmanifest">
<title>現調台帳</title>
<style>
:root{--bg:#f6f6f3;--card:#fff;--ink:#111;--muted:#666;--line:#d7d7d2;--soft:#eeeeea;--ok:#146c43;--danger:#991b1b;--warn:#8a5a00}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;font-size:15px;line-height:1.45}header{position:sticky;top:0;z-index:10;background:rgba(246,246,243,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:10px 12px 8px}h1{font-size:18px;margin:0 0 8px;font-weight:900}.topbar,.btns{display:flex;gap:8px;overflow:auto}.topbar button{white-space:nowrap}main{padding:12px 12px 90px;max-width:900px;margin:auto}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin:0 0 12px;box-shadow:0 2px 10px rgba(0,0,0,.035)}h2{font-size:16px;margin:0 0 10px;border-left:4px solid #111;padding-left:8px}.grid{display:grid;grid-template-columns:1fr;gap:10px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}label{display:block;font-size:12px;font-weight:900;color:#333;margin:0 0 4px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;background:#fff;padding:10px 11px;font:inherit;min-height:42px}textarea{min-height:82px;resize:vertical}button{border:1px solid var(--line);background:#fff;border-radius:12px;padding:9px 12px;font-weight:900;font:inherit}.primary{background:#111;color:#fff;border-color:#111}.ok{background:var(--ok);color:#fff;border-color:var(--ok)}.danger{background:var(--danger);color:#fff;border-color:var(--danger)}.mini{font-size:12px;color:var(--muted);margin-top:5px}.item{border:1px solid var(--line);background:#fafafa;border-radius:14px;padding:10px;margin-top:10px}.itemHead{display:flex;justify-content:space-between;gap:8px;align-items:center;margin-bottom:8px}.badge{font-size:12px;border:1px solid var(--line);background:#fff;border-radius:99px;padding:3px 8px;color:#333}.photoGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}.thumb{border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#eee;position:relative}.thumb img{width:100%;height:96px;object-fit:cover;display:block}.thumb button{position:absolute;right:4px;top:4px;padding:2px 6px;border-radius:8px;background:rgba(255,255,255,.92)}.calcbox{background:#f9f9f7;border:1px dashed #bbb;border-radius:12px;padding:10px}.total{font-size:18px;font-weight:900}.checks{display:grid;grid-template-columns:1fr 1fr;gap:8px}.check{display:flex;gap:8px;align-items:center;border:1px solid var(--line);border-radius:12px;padding:8px;background:#fff}.check input{width:auto;min-height:auto}.footer{position:fixed;left:0;right:0;bottom:0;background:rgba(246,246,243,.96);border-top:1px solid var(--line);padding:8px 12px calc(8px + env(safe-area-inset-bottom));display:flex;gap:8px;z-index:12}.footer button{flex:1}.warn{color:var(--warn);font-weight:900}.ro{background:#f3f3ef}@media(max-width:520px){.row,.row3{grid-template-columns:1fr}.checks{grid-template-columns:1fr}.photoGrid{grid-template-columns:repeat(2,1fr)}}@media print{header,.footer,.noPrint,.thumb button{display:none!important}body{background:#fff;font-size:11px}main{padding:0;max-width:none}.card{box-shadow:none;border:1px solid #888;border-radius:0;break-inside:avoid;margin:0 0 8px}.photoGrid{grid-template-columns:repeat(4,1fr)}.thumb img{height:120px}input,select,textarea{border:0;padding:2px;min-height:auto}.item{break-inside:avoid}}
</style>
</head><body>
<header><h1>現調台帳</h1><div class="topbar"><button class="primary" onclick="saveNow()">保存</button><button onclick="loadNow()">読込</button><button onclick="exportJson()">バックアップ</button><button onclick="document.getElementById('jsonIn').click()">復元</button><button onclick="exportText()">テキスト</button><button onclick="window.print()">PDF</button><button onclick="newLedger()">新規</button></div><input id="jsonIn" class="noPrint" type="file" accept="application/json" style="display:none" onchange="importJson(this)"></header>
<main>
<section class="card"><h2>1. 現場基本情報</h2><div class="grid"><div class="row"><div><label>現調日</label><input id="date" type="date"></div><div><label>担当者</label><input id="staff" placeholder="例：山﨑"></div></div><div><label>現場名</label><input id="site" placeholder="例：〇〇様邸／〇〇工事"></div><div><label>住所</label><input id="address" placeholder="現場住所"></div><div class="row"><div><label>顧客・元請</label><input id="client"></div><div><label>連絡先</label><input id="contact" inputmode="tel"></div></div><div class="row"><div><label>天候</label><select id="weather"><option></option><option>晴れ</option><option>曇り</option><option>雨</option><option>強風</option></select></div><div><label>建物種別</label><select id="building"><option></option><option>戸建</option><option>アパート</option><option>マンション</option><option>店舗</option><option>工場・倉庫</option><option>公共施設</option><option>その他</option></select></div></div><div><label>現調目的</label><select id="purpose"><option>見積作成</option><option>追加工事確認</option><option>漏水・不具合確認</option><option>施工前確認</option><option>完了確認</option></select></div></div></section>
<section class="card"><h2>2. 現場条件チェック</h2><div class="checks"><label class="check"><input id="chkScaffold" type="checkbox">足場必要</label><label class="check"><input id="chkParking" type="checkbox">駐車可</label><label class="check"><input id="chkPower" type="checkbox">電源あり</label><label class="check"><input id="chkWater" type="checkbox">水道あり</label><label class="check"><input id="chkNeighbor" type="checkbox">近隣注意</label><label class="check"><input id="chkDanger" type="checkbox">危険箇所あり</label><label class="check"><input id="chkLeak" type="checkbox">漏水あり</label><label class="check"><input id="chkPhotoPerm" type="checkbox">撮影許可済</label></div><div style="margin-top:10px"><label>搬入・養生・注意点</label><textarea id="access" placeholder="道路幅、車両位置、室外機、荷揚げ、養生、近隣など"></textarea></div></section>
<section class="card"><h2>3. 測定台帳</h2><div class="calcbox"><div>合計面積 <span class="total" id="sumArea">0.00</span> ㎡ ／ 合計延長 <span class="total" id="sumLen">0.00</span> m ／ 個数 <span class="total" id="sumQty">0</span></div><div class="mini">スケール・レーザーで実測した値を入力。控除は開口・対象外範囲を入力。</div></div><div class="btns noPrint" style="margin-top:10px"><button class="primary" onclick="addMeasure('面積')">面積追加</button><button onclick="addMeasure('延長')">延長追加</button><button onclick="addMeasure('個数')">個数追加</button></div><div id="measures"></div></section>
<section class="card"><h2>4. 劣化・施工メモ</h2><div class="btns noPrint"><button class="primary" onclick="addDefect()">劣化箇所追加</button></div><div id="defects"></div></section>
<section class="card"><h2>5. 写真台帳</h2><div class="mini">iPhoneカメラ起動対応。写真は端末内保存です。重要案件はPDF保存またはバックアップも併用してください。</div><div class="btns noPrint" style="margin-top:10px"><button class="primary" onclick="addPhotoGroup()">写真枠追加</button></div><div id="photoGroups"></div></section>
<section class="card"><h2>6. 見積前整理</h2><div class="grid"><div><label>工事項目候補</label><textarea id="workItems" placeholder="高圧洗浄、下地補修、シーリング、外壁塗装、鉄部塗装、防水など"></textarea></div><div><label>規格・仕様候補</label><textarea id="specs" placeholder="下塗・中塗・上塗、工法、膜厚、回数など"></textarea></div><div><label>未確定・顧客確認事項</label><textarea id="unknowns" placeholder="色、範囲、仕様、追加範囲、足場、近隣、施工日など"></textarea></div><div><label>概算・単価メモ</label><textarea id="priceMemo" placeholder="概算金額、単価、値引き不可ライン、別途項目など"></textarea></div></div></section>
<section class="card"><h2>7. 最終判定</h2><div class="row"><div><label>見積可否</label><select id="quoteStatus"><option>見積作成可能</option><option>追加確認後に見積</option><option>再現調必要</option><option>対応不可</option></select></div><div><label>優先度</label><select id="priority"><option>通常</option><option>急ぎ</option><option>最優先</option><option>保留</option></select></div></div><div style="margin-top:10px"><label>総合メモ</label><textarea id="finalMemo"></textarea></div></section>
</main><div class="footer noPrint"><button class="primary" onclick="saveNow()">保存</button><button onclick="shareText()">共有</button><button onclick="window.print()">PDF</button></div>
<script>
const KEY='gencho_daicho_v2';let measureNo=0,defectNo=0,photoNo=0;const ids=['date','staff','site','address','client','contact','weather','building','purpose','access','workItems','specs','unknowns','priceMemo','quoteStatus','priority','finalMemo'];const chks=['chkScaffold','chkParking','chkPower','chkWater','chkNeighbor','chkDanger','chkLeak','chkPhotoPerm'];function today(){return new Date().toISOString().slice(0,10)}date.value=today();function esc(s){return (s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function addMeasure(type='面積',d={}){measureNo++;const div=document.createElement('div');div.className='item';div.dataset.type=type;div.innerHTML=`<div class="itemHead"><b>測定 ${measureNo}</b><span class="badge">${type}</span></div><div class="grid"><div><label>部位・範囲</label><input class="mName" value="${esc(d.name)}" placeholder="例：外壁南面／屋上立上り"></div><div class="row3"><div><label>幅・長さ</label><input class="mW" type="number" step="0.001" inputmode="decimal" value="${d.w||''}" oninput="calcAll()"></div><div><label>高さ・奥行</label><input class="mH" type="number" step="0.001" inputmode="decimal" value="${d.h||''}" oninput="calcAll()"></div><div><label>数量</label><input class="mQ" type="number" step="0.001" inputmode="decimal" value="${d.q||1}" oninput="calcAll()"></div></div><div class="row"><div><label>控除</label><input class="mD" type="number" step="0.001" inputmode="decimal" value="${d.d||''}" oninput="calcAll()"></div><div><label>計算結果</label><input class="mR ro" readonly></div></div><div><label>根拠・備考</label><textarea class="mMemo" placeholder="レーザー実測、図面確認、開口控除など">${esc(d.memo)}</textarea></div></div><div class="btns noPrint"><button class="danger" onclick="this.closest('.item').remove();calcAll()">削除</button></div>`;measures.appendChild(div);calcAll()}function calcAll(){let a=0,l=0,qsum=0;document.querySelectorAll('#measures .item').forEach(el=>{const type=el.dataset.type,w=parseFloat(el.querySelector('.mW').value)||0,h=parseFloat(el.querySelector('.mH').value)||0,q=parseFloat(el.querySelector('.mQ').value)||0,d=parseFloat(el.querySelector('.mD').value)||0;let r=0,u='';if(type==='面積'){r=w*h*q-d;a+=Math.max(0,r);u='㎡'}else if(type==='延長'){r=w*q-d;l+=Math.max(0,r);u='m'}else{r=q-d;qsum+=Math.max(0,r);u='箇所'}el.querySelector('.mR').value=(Math.max(0,r)).toFixed(type==='個数'?0:2)+' '+u});sumArea.textContent=a.toFixed(2);sumLen.textContent=l.toFixed(2);sumQty.textContent=qsum.toFixed(0)}function addDefect(d={}){defectNo++;const div=document.createElement('div');div.className='item';div.innerHTML=`<div class="itemHead"><b>劣化 ${defectNo}</b><span class="badge">確認</span></div><div class="grid"><div><label>部位</label><input class="dPlace" value="${esc(d.place)}" placeholder="例：外壁北面、屋上ドレン周り"></div><div class="row"><div><label>劣化内容</label><select class="dType"><option></option><option>チョーキング</option><option>クラック</option><option>浮き</option><option>爆裂</option><option>錆</option><option>漏水</option><option>膨れ</option><option>剥離</option><option>汚染</option><option>その他</option></select></div><div><label>緊急度</label><select class="dUrg"><option>通常</option><option>要注意</option><option>早急</option><option>危険</option></select></div></div><div><label>処置案・備考</label><textarea class="dMemo">${esc(d.memo)}</textarea></div></div><div class="btns noPrint"><button class="danger" onclick="this.closest('.item').remove()">削除</button></div>`;defects.appendChild(div);if(d.type)div.querySelector('.dType').value=d.type;if(d.urg)div.querySelector('.dUrg').value=d.urg}function addPhotoGroup(d={}){photoNo++;const div=document.createElement('div');div.className='item photoGroup';div.innerHTML=`<div class="itemHead"><b>写真 ${photoNo}</b><span class="badge">撮影</span></div><div class="grid"><div><label>写真タイトル</label><input class="pTitle" value="${esc(d.title)}" placeholder="例：外壁南面 劣化状況"></div><div><label>写真メモ</label><textarea class="pMemo">${esc(d.memo)}</textarea></div><input class="pInput noPrint" type="file" accept="image/*" capture="environment" multiple onchange="loadPhotos(this)"><div class="photoGrid"></div></div><div class="btns noPrint"><button onclick="this.closest('.photoGroup').querySelector('.pInput').click()">撮影・追加</button><button class="danger" onclick="this.closest('.item').remove()">削除</button></div>`;photoGroups.appendChild(div);(d.photos||[]).forEach(src=>appendThumb(div.querySelector('.photoGrid'),src))}function loadPhotos(input){const grid=input.closest('.photoGroup').querySelector('.photoGrid');[...input.files].forEach(file=>{const r=new FileReader();r.onload=e=>appendThumb(grid,e.target.result);r.readAsDataURL(file)});input.value=''}function appendThumb(grid,src){const t=document.createElement('div');t.className='thumb';t.innerHTML=`<img src="${src}"><button class="noPrint" onclick="this.closest('.thumb').remove()">×</button>`;grid.appendChild(t)}function collect(){let base={};ids.forEach(id=>base[id]=document.getElementById(id).value||'');let checks={};chks.forEach(id=>checks[id]=document.getElementById(id).checked);return{base,checks,measures:[...document.querySelectorAll('#measures .item')].map(el=>({type:el.dataset.type,name:el.querySelector('.mName').value,w:el.querySelector('.mW').value,h:el.querySelector('.mH').value,q:el.querySelector('.mQ').value,d:el.querySelector('.mD').value,memo:el.querySelector('.mMemo').value})),defects:[...document.querySelectorAll('#defects .item')].map(el=>({place:el.querySelector('.dPlace').value,type:el.querySelector('.dType').value,urg:el.querySelector('.dUrg').value,memo:el.querySelector('.dMemo').value})),photos:[...document.querySelectorAll('.photoGroup')].map(el=>({title:el.querySelector('.pTitle').value,memo:el.querySelector('.pMemo').value,photos:[...el.querySelectorAll('img')].map(i=>i.src)}))}}function apply(d){if(!d)return;Object.entries(d.base||{}).forEach(([k,v])=>{if(document.getElementById(k))document.getElementById(k).value=v});Object.entries(d.checks||{}).forEach(([k,v])=>{if(document.getElementById(k))document.getElementById(k).checked=v});measures.innerHTML='';measureNo=0;(d.measures||[]).forEach(m=>addMeasure(m.type,m));defects.innerHTML='';defectNo=0;(d.defects||[]).forEach(addDefect);photoGroups.innerHTML='';photoNo=0;(d.photos||[]).forEach(addPhotoGroup);calcAll()}function saveNow(){try{localStorage.setItem(KEY,JSON.stringify(collect()));alert('保存しました')}catch(e){alert('保存容量を超えました。写真枚数を減らすか、PDF保存またはJSONバックアップを実行してください。')}}function loadNow(){const raw=localStorage.getItem(KEY);if(!raw){alert('保存データがありません');return}apply(JSON.parse(raw));alert('読込しました')}function newLedger(){if(confirm('現在の入力を消して新規作成しますか？保存済みデータは残ります。')){document.querySelectorAll('input,textarea').forEach(x=>{if(x.type==='checkbox')x.checked=false;else if(x.type!=='file')x.value=''});document.querySelectorAll('select').forEach(x=>x.selectedIndex=0);date.value=today();measures.innerHTML='';defects.innerHTML='';photoGroups.innerHTML='';measureNo=defectNo=photoNo=0;addMeasure('面積');addDefect();addPhotoGroup();calcAll()}}function filename(ext){return'現調台帳_'+(site.value||'未入力')+'_'+today()+ext}function makeText(){const d=collect(),b=d.base;let lines=['【現調台帳】'];['date','staff','site','address','client','contact','weather','building','purpose'].forEach(k=>lines.push(k+': '+(b[k]||'')));lines.push('\n【現場条件】');Object.entries(d.checks).forEach(([k,v])=>{if(v)lines.push(k)});lines.push('注意点: '+(b.access||''));lines.push('\n【測定】');d.measures.forEach((m,i)=>lines.push(`${i+1}. ${m.type}｜${m.name}｜${m.w}×${m.h}×${m.q} 控除${m.d}｜${m.memo}`));lines.push(`合計 面積${sumArea.textContent}㎡ 延長${sumLen.textContent}m 個数${sumQty.textContent}`);lines.push('\n【劣化】');d.defects.forEach((x,i)=>lines.push(`${i+1}. ${x.place}｜${x.type}｜${x.urg}｜${x.memo}`));lines.push('\n【見積前整理】');lines.push('項目候補: '+b.workItems);lines.push('仕様候補: '+b.specs);lines.push('未確定: '+b.unknowns);lines.push('概算メモ: '+b.priceMemo);lines.push('\n【判定】');lines.push(b.quoteStatus+' / '+b.priority);lines.push(b.finalMemo);return lines.join('\n')}function download(text,name,type){const blob=new Blob([text],{type});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();URL.revokeObjectURL(a.href)}function exportText(){download(makeText(),filename('.txt'),'text/plain;charset=utf-8')}function exportJson(){download(JSON.stringify(collect()),filename('.json'),'application/json;charset=utf-8')}function importJson(input){const f=input.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{try{apply(JSON.parse(e.target.result));alert('復元しました')}catch(err){alert('JSONを読めませんでした')}};r.readAsText(f);input.value=''}async function shareText(){const text=makeText();if(navigator.share){try{await navigator.share({title:'現調台帳',text})}catch(e){}}else{await navigator.clipboard.writeText(text);alert('コピーしました')}}addMeasure('面積');addDefect();addPhotoGroup();if('serviceWorker'in navigator){navigator.serviceWorker.register('./service-worker.js').catch(()=>{})}
</script></body></html>
