<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#14532d">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Yamazaki-Tosou 工事写真台帳</title>
<style>
:root{--bg:#f4f6f8;--ink:#111827;--muted:#667085;--line:#111;--green:#14532d;--red:#7f1d1d;--safe-bottom:env(safe-area-inset-bottom)}*{box-sizing:border-box}html{-webkit-text-size-adjust:100%;touch-action:manipulation}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Yu Gothic','YuGothic','Hiragino Kaku Gothic ProN',Meiryo,sans-serif;padding-bottom:calc(104px + var(--safe-bottom))}header{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.96);border-bottom:1px solid #ddd;padding:12px 14px 10px;backdrop-filter:blur(10px)}h1{font-size:22px;line-height:1.25;margin:0;font-weight:800}.sub{font-size:13px;color:var(--muted);margin-top:4px}main{max-width:1180px;margin:12px auto;padding:0 10px 140px}.panel{background:#fff;border:1px solid #ddd;border-radius:16px;padding:14px;margin:10px 0;box-shadow:0 1px 3px #0002}.ok{background:#ecfdf5;border-color:#bbf7d0;color:#14532d}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}label{font-size:13px;color:var(--muted);display:block;margin-bottom:5px}input,select,button{font:inherit;font-size:16px!important;min-height:44px;border-radius:10px}input,select{width:100%;border:1px solid #cfd4dc;padding:9px;background:#fff}button{border:1px solid #bbb;background:#fff;padding:9px 12px;font-weight:700;cursor:pointer}.primary{background:var(--green)!important;color:white!important;border-color:var(--green)!important}.danger{background:var(--red)!important;color:white!important;border-color:var(--red)!important}.tabs{display:flex;gap:8px;overflow-x:auto;padding:5px 0}.tab{white-space:nowrap;border-radius:999px}.tab.active{background:#111;color:#fff}.section{display:none}.section.active{display:block}.small{font-size:13px;color:var(--muted);line-height:1.55}.note{font-size:13px;line-height:1.7;color:#344054}.toolbar{display:flex;gap:8px;flex-wrap:wrap}.ledger-list{display:grid;gap:12px}.entry-card{background:#fff;border:1px solid #d0d5dd;border-radius:14px;padding:10px;display:grid;grid-template-columns:minmax(280px,1fr) 210px;gap:12px;align-items:stretch}.photo-box{min-height:250px;border:2px dashed #9ca3af;background:#fafafa;display:flex;align-items:center;justify-content:center;text-align:center;color:#667085;position:relative;overflow:hidden;border-radius:10px}.photo-box img{width:100%;height:100%;object-fit:cover;object-position:center;display:block}.photo-box.selected{outline:4px solid rgba(20,83,45,.35);outline-offset:2px}.side-box{border:1.3pt solid #111;background:#fff;display:grid;grid-template-rows:42px 46px repeat(5,42px);overflow:hidden}.side-row{border-bottom:1.1pt solid #111;display:grid;align-items:center}.side-row:last-child{border-bottom:0}.side-no{grid-template-columns:54px 1fr}.side-no span,.work-row span{border-right:1.1pt solid #111;height:100%;display:flex;align-items:center;padding-left:10px}.work-row{grid-template-columns:54px 1fr}.side-box input{border:0;border-radius:0;min-height:0;height:100%;padding:4px 8px}.no-input{text-align:center;font-weight:700}.note-line{border-bottom:1.1pt dotted #777}.card-footer{grid-column:1/-1;display:flex;gap:8px;flex-wrap:wrap}.card-footer button{font-size:14px!important;min-height:38px;padding:6px 9px}.cover-preview-wrap{overflow:auto;padding:8px;background:#f8fafc;border-radius:12px}.cover-page{width:210mm;height:297mm;background:#fff;margin:0 auto;border:1px solid #ddd;position:relative}.cover-demo{position:absolute;left:10%;right:10%;top:10%;bottom:10%;border:2px solid #111;padding:26mm 14mm}.cover-demo h2{text-align:center;font-family:'Yu Mincho','YuMincho',serif;font-weight:500;margin:0 auto 18mm;border-bottom:2px solid #111;width:70%;padding-bottom:5mm;letter-spacing:.1em}.cover-demo-row{display:grid;grid-template-columns:32mm 1fr;align-items:end;margin:12mm 0;font-family:'Yu Mincho','YuMincho',serif}.cover-demo-row div:nth-child(2){border-bottom:2px solid #111;text-align:center;padding-bottom:2mm}.hide{display:none!important}.bottom-bar{position:fixed;left:0;right:0;bottom:0;z-index:70;display:grid;grid-template-columns:repeat(6,1fr);gap:6px;padding:8px 7px calc(8px + var(--safe-bottom));background:rgba(255,255,255,.96);border-top:1px solid #d0d5dd;box-shadow:0 -4px 18px rgba(0,0,0,.12);backdrop-filter:blur(10px)}.bottom-bar button{min-height:52px;padding:6px 4px;font-size:12px!important}@media(max-width:760px){main{padding:0 8px 140px}.grid{grid-template-columns:1fr}.entry-card{grid-template-columns:1fr}.photo-box{height:45vh;min-height:300px}.cover-page{width:100%;height:auto;aspect-ratio:210/297}.cover-demo{padding:18mm 8mm}.tabs{position:sticky;top:78px;background:var(--bg);z-index:20}}
</style>
</head>
<body>
<header><h1>Yamazaki-Tosou 工事写真台帳</h1><div class="sub">現場ごとにフォルダをコピーし、写真を貼り付けてPDF保存できます。</div></header>
<main>
<div class="panel ok"><b>使い方:</b> 表紙を入力 → 写真枠へ写真を貼り付け → 必要な文字を入力 → 「PDF」で保存します。</div>
<div class="panel"><h2>写真圧縮設定</h2><label>圧縮</label><select id="resizePreset"><option value="large">大：強く圧縮・軽量（約80〜180KB/枚）</option><option value="middle" selected>中：標準（約150〜350KB/枚）</option><option value="small">小：軽く圧縮・画質優先（約300〜700KB/枚）</option></select><p id="resizeStatus" class="small">写真未取込</p></div>
<div class="tabs"><button class="tab active" onclick="showTab('edit',this)">入力</button><button class="tab" onclick="showTab('coverPreview',this)">表紙確認</button><button class="tab" onclick="showTab('ledger',this)">写真台帳</button></div>
<section id="edit" class="section active"><div class="panel"><h2>表紙入力</h2><div class="grid"><div><label>現場名</label><input id="siteName" oninput="renderCover()"></div><div><label>工事名</label><input id="workName" value="塗装工事" oninput="renderCover()"></div><div><label>工事箇所</label><input id="workLocation" oninput="renderCover()"></div><div><label>着工</label><input id="startDate" oninput="renderCover()"></div><div><label>竣工</label><input id="finishDate" oninput="renderCover()"></div><div><label>施工者</label><input id="contractorName" oninput="renderCover()"></div><div><label>施工者を表紙に表示</label><select id="showContractor" onchange="renderCover()"><option value="yes" selected>表示する</option><option value="no">表示しない</option></select></div></div></div></section>
<section id="coverPreview" class="section"><div class="panel cover-preview-wrap"><div id="coverScreen" class="cover-page"></div></div></section>
<section id="ledger" class="section"><div class="panel"><h2>写真台帳入力</h2><p class="small">PDFは写真が入っている枠だけ出力します。</p><div class="toolbar"><button onclick="addEntry()">写真枠追加</button><button onclick="renumberEntries()">No.振り直し</button></div><div id="ledgerList" class="ledger-list"></div></div></section>
</main>
<div class="bottom-bar"><button class="primary" onclick="pickSelected('camera')">撮影</button><button onclick="pickSelected('library')">選択</button><button onclick="addEntryAndScroll()">枠追加</button><button onclick="exportJson()">保存</button><button class="danger" onclick="deleteSelected()">削除</button><button onclick="printPdf()">PDF</button></div>
<input id="photoInput" type="file" accept="image/*" class="hide">
<script>
const NOTE_LINES=5,PRESETS={large:{maxW:1000,maxH:1000,q:.68},middle:{maxW:1400,maxH:1400,q:.78},small:{maxW:1800,maxH:1800,q:.86}};let entries=[],selected=-1;function $(id){return document.getElementById(id)}function v(id){return $(id)?.value||''}function cover(){return{siteName:v('siteName'),workName:v('workName'),workLocation:v('workLocation'),startDate:v('startDate'),finishDate:v('finishDate'),contractorName:v('contractorName'),showContractor:v('showContractor')||'yes'}}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function showTab(id,b){document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'));$(id).classList.add('active');document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));if(b)b.classList.add('active');renderCover();if(id==='ledger')renderLedger()}function renderCover(){const c=cover();const rows=[['現場名',c.siteName],['工事名',c.workName],['工事箇所',c.workLocation],['着工',c.startDate],['竣工',c.finishDate]];if(c.showContractor!=='no')rows.push(['施工者',c.contractorName]);const el=$('coverScreen');if(!el)return;el.innerHTML='<div class="cover-demo"><h2>工事写真帳</h2>'+rows.map(r=>'<div class="cover-demo-row"><div>'+r[0]+'</div><div>'+esc(r[1])+'</div></div>').join('')+'</div>'}function blank(n){return{no:String(n),work_type:'',notes:Array(NOTE_LINES).fill(''),image:''}}function sync(){document.querySelectorAll('.entry-card').forEach((card,i)=>{let e=entries[i]||blank(i+1);e.no=card.querySelector('.no-input').value||String(i+1);e.work_type=card.querySelector('.work-input').value||'';e.notes=[...card.querySelectorAll('.note-input')].map(x=>x.value||'').slice(0,NOTE_LINES);while(e.notes.length<NOTE_LINES)e.notes.push('');entries[i]=e})}function renderLedger(){const g=$('ledgerList');if(!g)return;sync();g.innerHTML='';entries.forEach((e,i)=>{const d=document.createElement('div');d.className='entry-card';d.innerHTML='<div class="photo-box '+(selected===i?'selected':'')+'" onclick="selectEntry('+i+');pickSelected(\'library\')">'+(e.image?'<img src="'+e.image+'">':'<span>タップして写真を追加</span>')+'</div><div class="side-box"><div class="side-row side-no"><span>No.</span><input class="no-input" value="'+esc(e.no)+'"></div><div class="side-row work-row"><span>工種</span><input class="work-input" value="'+esc(e.work_type)+'"></div>'+Array.from({length:NOTE_LINES},(_,j)=>'<div class="side-row note-line"><input class="note-input" value="'+esc(e.notes[j]||'')+'" placeholder="自由入力"></div>').join('')+'</div><div class="card-footer"><button onclick="selectEntry('+i+')">選択</button><button onclick="removePhoto('+i+')">写真削除</button><button class="danger" onclick="removeEntry('+i+')">枠削除</button></div>';g.appendChild(d)})}function addEntry(){sync();entries.push(blank(entries.length+1));renderLedger()}function addEntryAndScroll(){addEntry();setTimeout(()=>document.querySelector('.entry-card:last-child')?.scrollIntoView({behavior:'smooth',block:'center'}),50)}function renumberEntries(){sync();entries.forEach((e,i)=>e.no=String(i+1));renderLedger()}function selectEntry(i){selected=i;renderLedger()}function deleteSelected(){if(selected<0){alert('削除する枠を選択してください。');return}removeEntry(selected)}function removeEntry(i){if(!confirm('この写真枠を削除しますか？'))return;sync();entries.splice(i,1);selected=-1;renumberEntries()}function removePhoto(i){sync();entries[i].image='';renderLedger()}function pickSelected(src){sync();if(selected<0){selected=0;if(!entries[0])entries[0]=blank(1)}const inp=$('photoInput');inp.value='';inp.removeAttribute('capture');if(src==='camera')inp.setAttribute('capture','environment');inp.onchange=()=>{const f=inp.files&&inp.files[0];if(f)loadImage(f,selected)};inp.click()}function loadImage(file,i){const p=PRESETS[v('resizePreset')]||PRESETS.middle,r=new FileReader();r.onload=()=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height,scale=Math.min(1,p.maxW/w,p.maxH/h);w=Math.round(w*scale);h=Math.round(h*scale);const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);entries[i].image=c.toDataURL('image/jpeg',p.q);$('resizeStatus').textContent='写真取込済み：'+entries.filter(e=>e.image).length+'枚';renderLedger()};img.src=r.result};r.readAsDataURL(file)}function exportJson(){sync();const data={cover:cover(),entries:entries};const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));a.download=(cover().siteName||'工事写真台帳')+'_入力データ.json';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500)}function t(ctx,s,x,y,size=24,opt={}){ctx.save();ctx.font=(opt.bold?'700 ':'')+size+'px Yu Gothic, Meiryo, sans-serif';ctx.fillStyle='#111';ctx.textAlign=opt.align||'left';ctx.textBaseline=opt.base||'middle';ctx.fillText(s||'',x,y);ctx.restore()}function line(ctx,x1,y1,x2,y2,w=2){ctx.save();ctx.strokeStyle='#111';ctx.lineWidth=w;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}function drawFit(ctx,img,x,y,w,h){const r=Math.max(w/img.width,h/img.height),iw=img.width*r,ih=img.height*r;ctx.drawImage(img,x+(w-iw)/2,y+(h-ih)/2,iw,ih)}function imgLoad(src){return new Promise((res,rej)=>{const im=new Image();im.onload=()=>res(im);im.onerror=rej;im.src=src})}async function drawCoverPage(){const c=cover(),cv=document.createElement('canvas'),ctx=cv.getContext('2d');cv.width=1240;cv.height=1754;ctx.fillStyle='white';ctx.fillRect(0,0,cv.width,cv.height);ctx.strokeStyle='#111';ctx.lineWidth=3;ctx.strokeRect(145,130,950,1440);t(ctx,'工事写真帳',620,290,34,{align:'center'});line(ctx,310,335,930,335,3);const rows=[['現場名',c.siteName],['工事名',c.workName],['工事箇所',c.workLocation],['工期　　着手',c.startDate],['　　　　竣工',c.finishDate]];if(c.showContractor!=='no')rows.push(['施工者',c.contractorName]);let y=500;rows.forEach((r,idx)=>{t(ctx,r[0],250,y,24);line(ctx,420,y+34,1000,y+34,3);t(ctx,r[1],710,y+8,24,{align:'center'});y+=idx===2?120:105});return cv}async function drawInfoBox(ctx,e,x,y,w,h){ctx.save();ctx.strokeStyle='#111';ctx.lineWidth=2;ctx.strokeRect(x,y,w,h);const rh=h/9;for(let i=1;i<9;i++){ctx.setLineDash(i===4?[5,5]:[]);line(ctx,x,y+rh*i,x+w,y+rh*i,1.5)}ctx.setLineDash([]);t(ctx,'No.　'+(e.no||''),x+w/2,y+rh*.5,24,{align:'center'});const vals=[e.work_type||'',e.notes[0]||'',e.notes[1]||'',e.notes[2]||'',e.notes[3]||'',e.notes[4]||''];[3.5,4.5,5.5,6.5,7.5,8.5].forEach((m,i)=>{if(vals[i])t(ctx,vals[i],x+w/2,y+rh*m,22,{align:'center',bold:i<2})});ctx.restore()}async function drawPhotoPage(list){const cv=document.createElement('canvas'),ctx=cv.getContext('2d');cv.width=1240;cv.height=1754;ctx.fillStyle='white';ctx.fillRect(0,0,cv.width,cv.height);const ys=[90,640,1190],ph=405,px=105,pw=610,ix=790,iw=285;for(let i=0;i<list.length;i++){const e=list[i],y=ys[i],im=await imgLoad(e.image);ctx.save();ctx.beginPath();ctx.rect(px,y,pw,ph);ctx.clip();drawFit(ctx,im,px,y,pw,ph);ctx.restore();ctx.strokeStyle='#111';ctx.lineWidth=2;ctx.strokeRect(px,y,pw,ph);await drawInfoBox(ctx,e,ix,y,iw,ph)}return cv}function b64bytes(b64){const bin=atob(b64),u=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u}function pdfFromCanvases(canvases,name){const enc=new TextEncoder(),parts=[];let off=0,xref=[0];function add(s){const u=typeof s==='string'?enc.encode(s):s;parts.push(u);off+=u.length}function obj(n,arr){xref[n]=off;add(n+' 0 obj\n');arr.forEach(add);add('\nendobj\n')}const W=595.28,H=841.89,imgs=[];canvases.forEach(cv=>imgs.push(b64bytes(cv.toDataURL('image/jpeg',.92).split(',')[1])));obj(1,['<< /Type /Catalog /Pages 2 0 R >>']);const kids=[];for(let i=0;i<imgs.length;i++)kids.push(3+i*3+' 0 R');obj(2,['<< /Type /Pages /Kids ['+kids.join(' ')+'] /Count '+imgs.length+' >>']);for(let i=0;i<imgs.length;i++){const p=3+i*3,im=p+1,co=p+2,stream='q '+W+' 0 0 '+H+' 0 0 cm /Im'+i+' Do Q';obj(p,['<< /Type /Page /Parent 2 0 R /MediaBox [0 0 '+W+' '+H+'] /Resources << /XObject << /Im'+i+' '+im+' 0 R >> >> /Contents '+co+' 0 R >>']);obj(im,['<< /Type /XObject /Subtype /Image /Width '+canvases[i].width+' /Height '+canvases[i].height+' /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length '+imgs[i].length+' >>\nstream\n',imgs[i],'\nendstream']);obj(co,['<< /Length '+enc.encode(stream).length+' >>\nstream\n'+stream+'\nendstream'])}const start=off;add('xref\n0 '+(xref.length)+'\n0000000000 65535 f \n');for(let i=1;i<xref.length;i++)add(String(xref[i]).padStart(10,'0')+' 00000 n \n');add('trailer\n<< /Size '+xref.length+' /Root 1 0 R >>\nstartxref\n'+start+'\n%%EOF');const blob=new Blob(parts,{type:'application/pdf'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name+'.pdf';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}async function printPdf(){sync();const photos=entries.filter(e=>e.image);if(!photos.length){alert('写真を1枚以上入れてください。');return}const cs=[await drawCoverPage()];for(let i=0;i<photos.length;i+=3)cs.push(await drawPhotoPage(photos.slice(i,i+3)));pdfFromCanvases(cs,(cover().siteName||'テスト')+'_工事写真台帳_'+new Date().toISOString().slice(0,10).replaceAll('-',''))}window.addEventListener('load',()=>{entries=[blank(1),blank(2),blank(3)];renderCover();renderLedger();if('serviceWorker'in navigator&&location.protocol.startsWith('http'))navigator.serviceWorker.register('service-worker.js').catch(()=>{})});
</script>
</body>
</html>
