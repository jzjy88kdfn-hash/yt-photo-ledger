<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#14532d">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
  <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="120x120" href="icons/icon-120.png">
  <link rel="stylesheet" href="css/style.css">
  <title>Yamazaki-Tosou 工事写真台帳</title>
</head>
<body>
  <header class="no-print">
    <h1>Yamazaki-Tosou 工事写真台帳</h1>
    <div class="sub">現場ごとにフォルダをコピーし、写真を貼り付けてPDF保存できます。</div>
    <div class="toolbar desktop-only">
      <button class="primary" onclick="printPdf()">PDF作成</button>
      <button onclick="exportJson()">入力データ保存</button>
      <label class="filebtn">入力データ読込<input type="file" accept="application/json" hidden onchange="importJson(event)"></label>
      <button onclick="addEntry()">写真枠追加</button>
      <button onclick="openDeleteMenu()">削除メニュー</button>
    </div>
  </header>

  <main>
    <div class="panel ok no-print">
      <b>使い方:</b> 表紙を入力 → 写真枠へ写真を貼り付け → 必要な文字を入力 → 「PDF作成」で保存します。
    </div>
    <div class="panel no-print">
      <h2>写真圧縮設定</h2>
      <div class="grid">
        <div>
          <label>圧縮</label>
          <select id="resizePreset" onchange="updateResizePresetNote()">
            <option value="large">大：強く圧縮・軽量（約80〜180KB/枚）</option>
            <option value="middle" selected>中：標準（約150〜350KB/枚）</option>
            <option value="small">小：軽く圧縮・画質優先（約300〜700KB/枚）</option>
          </select>
        </div>
      </div>
      <p id="resizePresetNote" class="small">現在：中（標準）目安 約150〜350KB/枚。写真の内容により前後します。</p>
      <p id="resizeStatus" class="small">写真未取込</p>
    </div>

    <div class="tabs no-print">
      <button class="tab active" onclick="showTab('edit',this)">入力</button>
      <button class="tab" onclick="showTab('coverPreview',this)">表紙確認</button>
      <button class="tab" onclick="showTab('ledger',this)">写真台帳</button>
    </div>

    <section id="edit" class="section active">
      <div class="panel">
        <h2>表紙入力</h2>
        <div class="grid">
          <div><label>現場名</label><input id="siteName" value=""></div>
          <div><label>工事名</label><input id="workName" value="塗装工事"></div>
          <div><label>工事箇所</label><input id="workLocation" value=""></div>
          <div><label>着工</label><input id="startDate" value=""></div>
          <div><label>竣工</label><input id="finishDate" value=""></div>
          <div><label>施工者</label><input id="contractorName" value=""></div>
          <div>
            <label>施工者を表紙に表示</label>
            <select id="showContractor">
              <option value="yes" selected>表示する</option>
              <option value="no">表示しない</option>
            </select>
          </div>
        </div>
        <p class="note">表紙タイトルは「工事写真帳」固定です。</p>
      </div>
    </section>

    <section id="coverPreview" class="section">
      <div class="panel cover-preview-wrap">
        <div id="coverScreen" class="cover-page"></div>
      </div>
    </section>

    <section id="ledger" class="section">
      <div class="panel">
        <h2>写真台帳入力</h2>
        <p class="small">No.は連番のまま使えます。固定表示は「工種」のみです。その他の行は自由入力です。PDFは写真が入っている枠だけ出力します。</p>
        <div id="ledgerList" class="ledger-list"></div>
        <div class="entry-actions no-print">
          <button onclick="addEntry()">写真枠追加</button>
          <button onclick="renumberEntries()">No.振り直し</button>
        </div>
      </div>
    </section>
  </main>

  <div class="bottom-bar no-print">
    <button class="primary" onclick="shootSelected()">撮影</button>
    <button onclick="chooseSelected()">選択</button>
    <button onclick="addEntryAndScroll()">枠追加</button>
    <button onclick="exportJson()">保存</button>
    <button class="danger" onclick="openDeleteMenu()">削除</button>
    <button onclick="printPdf()">PDF</button>
  </div>

  <div id="printRoot"></div>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Service Worker はHTTPSまたはlocalhostで登録します。file://直開き時は安全にスキップします。
    if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1')) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('service-worker.js').catch(function(err){ console.error('SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
