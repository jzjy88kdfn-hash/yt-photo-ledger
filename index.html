<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Yamazaki-Tosou 工事写真台帳</title>
<style>
:root{--ink:#111827;--muted:#667085;--line:#111827;--bg:#f4f6f8;--paper:#fff;--green:#14532d;--green2:#ecfdf5;--red:#7f1d1d;--safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom)}
*{box-sizing:border-box}html{-webkit-text-size-adjust:100%;touch-action:manipulation}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Yu Gothic','YuGothic','Hiragino Kaku Gothic ProN',Meiryo,sans-serif;padding-bottom:calc(98px + var(--safe-bottom));overscroll-behavior-y:contain}
header{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.96);border-bottom:1px solid #ddd;padding:calc(10px + var(--safe-top)) 12px 10px;backdrop-filter:blur(10px)}
h1{font-size:19px;line-height:1.3;margin:0;font-weight:800}.sub{font-size:12px;color:var(--muted);line-height:1.45;margin-top:2px}
main{max-width:1180px;margin:12px auto;padding:0 10px 130px}.panel{background:#fff;border:1px solid #ddd;border-radius:14px;padding:12px;margin:10px 0;box-shadow:0 1px 2px #0001}.ok{background:#ecfdf5;border-color:#bbf7d0;color:#14532d}.warn{background:#fff7ed;border-color:#fed7aa;color:#7c2d12}h2{font-size:18px;margin:0 0 10px}.small{font-size:12px;color:var(--muted);line-height:1.55}.note{font-size:13px;line-height:1.6;margin:6px 0 0;color:#344054}
button,label.filebtn,input,select{font:inherit;font-size:16px!important;min-height:44px;border-radius:10px}button,label.filebtn{border:1px solid #bbb;background:#fff;padding:9px 11px;font-weight:700;cursor:pointer}button:active,label.filebtn:active{transform:translateY(1px)}.primary{background:var(--green)!important;color:#fff!important;border-color:var(--green)!important}.danger{background:var(--red)!important;color:#fff!important;border-color:var(--red)!important}.soft{background:#f9fafb!important}input,select{width:100%;border:1px solid #cfd4dc;padding:9px;background:#fff}label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.tabs{display:flex;gap:8px;overflow-x:auto;padding:4px 0}.tab{white-space:nowrap;border-radius:999px}.tab.active{background:#111;color:#fff}.section{display:none}.section.active{display:block}.hide{display:none!important}
.cover-preview-wrap{overflow:auto;padding:8px;background:#f8fafc;border-radius:12px}.cover-page{width:210mm;height:297mm;background:var(--paper);margin:0 auto;border:1px solid #d0d5dd;position:relative;padding:24mm 21mm}.cover-inner{height:100%;border:1.4pt solid #111;padding:20mm 12mm 12mm}.cover-title{text-align:center;font-size:25px;letter-spacing:.45em;font-family:'Yu Mincho','YuMincho','Hiragino Mincho ProN','MS Mincho',serif;font-weight:500;border-bottom:1.4pt solid #111;margin:5mm 28mm 18mm;padding-bottom:3mm;white-space:nowrap}.cover-title span{letter-spacing:.45em}.cover-spacer{height:12mm}.cover-row{display:grid;grid-template-columns:38mm 1fr;align-items:end;min-height:22mm;font-family:'Yu Mincho','YuMincho','Hiragino Mincho ProN','MS Mincho',serif;font-size:16px;letter-spacing:.22em}.cover-label{padding-left:3mm;white-space:nowrap}.cover-value{border-bottom:1.2pt solid #111;min-height:10mm;padding:0 3mm 1.2mm;letter-spacing:.08em;display:flex;align-items:flex-end;line-height:1.15}.cover-period{display:grid;grid-template-columns:25mm 1fr;gap:4mm;align-items:end}.cover-sub-label{text-align:center;letter-spacing:.22em;font-size:.92em;padding-top:2.2mm;align-self:end}.cover-contractor{margin-top:22mm}.cover-inner.no-contractor .cover-spacer{height:16mm}.cover-inner.no-contractor .cover-row{min-height:24mm}
.ledger-list{display:grid;gap:12px}.entry-card{background:#fff;border:1px solid #d0d5dd;border-radius:14px;padding:10px;display:grid;grid-template-columns:minmax(280px,1fr) 210px;gap:12px;align-items:stretch}.photo-box{min-height:250px;border:2px dashed #9ca3af;background:#fafafa;display:flex;align-items:center;justify-content:center;text-align:center;color:#667085;position:relative;overflow:hidden;cursor:pointer;border-radius:10px}.photo-box img{width:100%;height:100%;object-position:center center;display:block}.photo-box.is-selected{outline:4px solid rgba(20,83,45,.35);outline-offset:2px}.photo-tools{position:absolute;left:8px;right:8px;bottom:8px;display:flex;gap:8px;justify-content:center;pointer-events:none}.photo-tools button{pointer-events:auto;min-height:38px;padding:7px 10px;border-radius:999px;background:rgba(255,255,255,.94);font-size:14px!important;backdrop-filter:blur(6px)}.side-box{border:1.4pt solid #111;background:#fff;display:grid;grid-template-rows:42px 46px repeat(5,42px);font-family:'Yu Gothic','YuGothic',Meiryo,sans-serif;overflow:hidden}.side-row{border-bottom:1.1pt solid #111;display:grid;align-items:center}.side-row:last-child{border-bottom:0}.side-no{grid-template-columns:54px 1fr;font-size:20px;padding:0}.no-label{border-right:1.1pt solid #111;padding-left:10px;font-size:17px;height:100%;display:flex;align-items:center}.work-row{grid-template-columns:54px 1fr}.work-label{border-right:1.1pt solid #111;padding-left:10px;font-size:17px;height:100%;display:flex;align-items:center}.side-box input{border:0;border-radius:0;min-height:0;height:100%;font-size:16px!important;padding:3px 8px}.side-box input.no-input{width:100%;font-size:20px!important;text-align:center;font-weight:700;padding:0 4px}.note-line{border-bottom:1.1pt dotted #777}.entry-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.entry-actions select{width:auto;min-width:140px}.card-footer{grid-column:1/-1;display:flex;gap:8px;flex-wrap:wrap}.card-footer button,.card-footer select{font-size:14px!important;min-height:38px;padding:6px 9px}
#printRoot{display:none}.print-page{width:210mm;height:297mm;background:#fff;position:relative;overflow:hidden;page-break-after:always;break-after:page}.print-page:last-child{page-break-after:auto;break-after:auto}.photo-print-page{padding:14mm 14mm 12mm}.print-entry{height:80mm;display:grid;grid-template-columns:1fr 50mm;gap:12mm;align-items:stretch;margin-bottom:9mm}.print-entry:last-child{margin-bottom:0}.print-photo{border:1.4pt solid #111;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#fff}.print-photo img{width:100%;height:100%;object-position:center center;display:block}.print-info{border:1.4pt solid #111;height:100%;display:grid;grid-template-rows:11mm 14mm repeat(5,1fr);font-family:'Yu Gothic','YuGothic',Meiryo,sans-serif}.print-no{border-bottom:1.1pt solid #111;font-size:16px;padding:1.8mm 4mm}.print-work{border-bottom:1.1pt double #111;display:grid;grid-template-columns:14mm 1fr;align-items:center}.print-work-label{font-size:13px;padding-left:3mm}.print-work-text{font-size:13px;text-align:center}.print-line{border-bottom:1.1pt dotted #777;display:flex;align-items:center;justify-content:center;text-align:center;font-size:13px;line-height:1.2;padding:0 2mm;white-space:pre-wrap}.print-line:last-child{border-bottom:0}.blank-photo-text{font-size:12px;color:#999}.bottom-bar{display:none}
@media(max-width:760px){main{max-width:none;margin:8px auto;padding:0 8px 130px}.desktop-only{display:none!important}.grid{grid-template-columns:1fr!important}.panel{padding:10px;margin:8px 0;border-radius:12px}.tabs{position:sticky;top:calc(58px + var(--safe-top));z-index:20;background:var(--bg);padding:6px 0}.cover-page{width:100%;height:auto;aspect-ratio:210/297;padding:12px}.cover-inner{padding:22px 12px}.cover-title{font-size:21px;margin:12px 22px 22px}.cover-row{font-size:14px;grid-template-columns:76px 1fr;min-height:44px}.cover-period{grid-template-columns:54px 1fr}.cover-sub-label{font-size:.9em;padding-top:2.6mm}.cover-contractor{margin-top:30px}.entry-card{grid-template-columns:1fr;gap:8px}.photo-box{height:58vh;min-height:330px;max-height:560px}.side-box{grid-template-rows:42px 46px repeat(5,42px)}.entry-actions select{width:100%}.bottom-bar{position:fixed;left:0;right:0;bottom:0;z-index:60;display:grid;grid-template-columns:repeat(6,1fr);gap:5px;padding:8px 6px calc(8px + var(--safe-bottom));background:rgba(255,255,255,.96);border-top:1px solid #d0d5dd;box-shadow:0 -4px 18px rgba(0,0,0,.12);backdrop-filter:blur(10px)}.bottom-bar button{min-height:50px;padding:6px 3px;font-size:11px!important;line-height:1.1}}
@media(min-width:761px){.mobile-only{display:none!important}}@media print{@page{size:A4 portrait;margin:0}body{background:#fff!important;padding:0!important;margin:0!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}header,main,.bottom-bar,.no-print{display:none!important}#printRoot{display:block!important}.cover-page{border:0!important;margin:0!important;box-shadow:none!important}}
</style>
</head>
<body>
<header class="no-print">
  <h1>Yamazaki-Tosou 工事写真台帳</h1>
  <div class="sub">現場ごとにフォルダをコピーし、写真を貼り付けてPDF保存できます。</div>
  <div class="toolbar desktop-only">
    <button class="primary" onclick="printPdf()">PDF作成</button>
    <button onclick="exportJson()">入力データ保存</button>
    <label class="filebtn">入力データ読込<input type="file" accept="application/json" hidden onchange="importJson(event)"></label>
    <button onclick="addEntry()">写真枠追加</button>
    <button onclick="openDeleteMenu()">削除メニュー</button>
  </div>
</header>
<main>
  <div class="panel ok no-print"><b>使い方:</b> 表紙を入力 → 写真枠へ写真を貼り付け → 必要な文字を入力 → 「PDF作成」で保存します。</div>
  <div class="panel no-print">
    <h2>写真圧縮設定</h2>
    <div class="grid">
      <div><label>圧縮</label><select id="resizePreset" onchange="updateResizePresetNote()"><option value="strong">大：強く圧縮・軽量（約80〜180KB/枚）</option><option value="middle" selected>中：標準（約150〜350KB/枚）</option><option value="light">小：軽く圧縮・画質優先（約300〜700KB/枚）</option></select></div>
    </div>
    <div id="resizeStatus" class="note"></div>
  </div>
  <div class="tabs no-print">
    <button class="tab active" onclick="showSection('cover',this)">表紙入力</button>
    <button class="tab" onclick="showSection('ledger',this)">写真台帳</button>
    <button class="tab" onclick="showSection('help',this)">使い方</button>
  </div>
  <section id="cover" class="section active">
    <div class="panel no-print">
      <h2>表紙入力</h2>
      <div class="grid">
        <div><label>現場名</label><input id="siteName" oninput="renderCoverScreen()" placeholder="例：〇〇マンション外壁改修工事"></div>
        <div><label>工事名</label><input id="workName" oninput="renderCoverScreen()" value="塗装工事"></div>
        <div><label>施工者</label><input id="contractorName" oninput="renderCoverScreen()" placeholder="例：山﨑塗装"></div>
        <div><label>着工</label><input id="startDate" oninput="renderCoverScreen()" placeholder="例：令和8年6月1日"></div>
        <div><label>竣工</label><input id="finishDate" oninput="renderCoverScreen()" placeholder="例：令和8年6月30日"></div>
        <div><label>施工者を表紙に表示</label><select id="showContractor" onchange="renderCoverScreen()"><option value="yes">表示する</option><option value="no">表示しない</option></select></div>
      </div>
    </div>
    <div class="cover-preview-wrap"><div id="coverPreview" class="cover-page"></div></div>
  </section>
  <section id="ledger" class="section">
    <div class="panel no-print"><div class="toolbar"><button class="primary" onclick="addEntryAndScroll()">写真枠追加</button><button onclick="renumberEntries()">No.振り直し</button><button onclick="clearDescriptionsOnly()">入力文だけ全削除</button><button onclick="clearPhotosOnly()">写真だけ全削除</button></div></div>
    <div id="ledgerList" class="ledger-list"></div>
  </section>
  <section id="help" class="section"><div class="panel"><h2>使い方</h2><p class="note">写真枠をタップすると、カメラ撮影または写真選択ができます。入力途中は「入力データ保存」でJSONを保存してください。PDF作成時は写真が入っている枠だけ出力されます。</p></div></section>
</main>
<div class="bottom-bar no-print">
  <button onclick="showSectionById('cover')">表紙</button>
  <button onclick="showSectionById('ledger')">写真</button>
  <button onclick="addEntryAndScroll()">枠追加</button>
  <button onclick="exportJson()">保存</button>
  <button onclick="openDeleteMenu()">削除</button>
  <button class="primary" onclick="printPdf()">PDF</button>
</div>
<input id="hiddenPhotoInput" type="file" accept="image/*" class="hide">
<div id="printRoot"></div>
<script>
const NOTE_LINES=5;
const PRESETS={strong:{label:'大（強く圧縮・軽量）',maxW:1000,maxH:1000,quality:.68,guide:'約80〜180KB/枚'},middle:{label:'中（標準）',maxW:1400,maxH:1400,quality:.78,guide:'約150〜350KB/枚'},light:{label:'小（軽く圧縮・画質優先）',maxW:1800,maxH:1800,quality:.86,guide:'約300〜700KB/枚'}};
let selectedPhotoBox=null;
let entries=[1,2,3].map(n=>({no:String(n),work_type:'',notes:Array(NOTE_LINES).fill(''),image:'',fit:'cover'}));
const byId=id=>document.getElementById(id);const val=id=>byId(id)?.value||'';
function esc(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function showSection(id,btn){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));byId(id).classList.add('active');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));if(btn)btn.classList.add('active')}
function showSectionById(id){showSection(id,document.querySelector(`.tab[onclick*="${id}"]`))}
function currentPreset(){return PRESETS[val('resizePreset')||'middle']||PRESETS.middle}
function updateResizePresetNote(){const p=currentPreset();byId('resizeStatus').textContent='現在：'+p.label+'　目安 '+p.guide+'。写真の内容により前後します。'}
function formatBytes(n){if(!n)return'0KB';const kb=n/1024;if(kb<1024)return Math.round(kb)+'KB';return (kb/1024).toFixed(1)+'MB'}
function dataUrlBytes(data){const b64=(data.split(',')[1]||'');return Math.round(b64.length*3/4)}
function getCover(){return{siteName:val('siteName'),workName:val('workName'),startDate:val('startDate'),finishDate:val('finishDate'),contractorName:val('contractorName'),showContractor:val('showContractor')}}
function coverMarkup(c){const show=c.showContractor!=='no';return `<div class="cover-inner ${show?'':'no-contractor'}"><div class="cover-title"><span>工事写真帳</span></div><div class="cover-spacer"></div><div class="cover-row"><div class="cover-label">現場名</div><div class="cover-value">${esc(c.siteName)}</div></div><div class="cover-row"><div class="cover-label">工事名</div><div class="cover-value">${esc(c.workName)}</div></div><div class="cover-row"><div class="cover-label">工　期</div><div class="cover-value"><div style="width:100%"><div class="cover-period"><div class="cover-sub-label">着工</div><div>${esc(c.startDate)}</div></div><div class="cover-period"><div class="cover-sub-label">竣工</div><div>${esc(c.finishDate)}</div></div></div></div></div>${show?`<div class="cover-row cover-contractor"><div class="cover-label">施工者</div><div class="cover-value">${esc(c.contractorName)}</div></div>`:''}</div>`}
function renderCoverScreen(){byId('coverPreview').innerHTML=coverMarkup(getCover())}
function placeholder(){return '<div class="placeholder">写真をタップして追加</div>'}
function imgTag(src,fit){return `<img src="${src}" style="object-fit:${fit||'cover'}">`}
function makeSideBox(e){const notes=Array.isArray(e.notes)?e.notes:[];let noteHtml='';for(let i=0;i<NOTE_LINES;i++){noteHtml+=`<div class="side-row note-line"><input class="note-input" data-note-index="${i}" value="${esc(notes[i]||'')}" placeholder="自由入力"></div>`}return `<div class="side-box"><div class="side-row side-no"><div class="no-label">No.</div><input class="no-input" value="${esc(e.no||'')}"></div><div class="side-row work-row"><div class="work-label">工種</div><input class="work-input" value="${esc(e.work_type||'')}"></div>${noteHtml}</div>`}
function createEntryCard(e){const d=document.createElement('div');d.className='entry-card';d.dataset.fit=e.fit||'cover';d.innerHTML=`<div class="photo-box">${e.image?imgTag(e.image,e.fit||'cover'):placeholder()}</div>${makeSideBox(e)}<div class="card-footer no-print"><button type="button" onclick="deleteCardPhoto(this)">写真だけ削除</button><button type="button" onclick="clearCardText(this)">入力文だけ削除</button><button type="button" class="danger" onclick="deleteCard(this)">この枠を削除</button><select onchange="changeCardFit(this)"><option value="cover" ${(e.fit||'cover')==='cover'?'selected':''}>枠いっぱい</option><option value="contain" ${(e.fit||'cover')==='contain'?'selected':''}>全体表示</option></select></div>`;const box=d.querySelector('.photo-box');box.onclick=ev=>{ev.preventDefault();openPhotoActionSheet(box)};box.addEventListener('dragover',ev=>ev.preventDefault());box.addEventListener('drop',ev=>{ev.preventDefault();if(ev.dataTransfer.files[0])loadImage(ev.dataTransfer.files[0],box)});addPhotoTools(box);return d}
function renderLedger(){const g=byId('ledgerList');if(!g)return;syncEntriesFromDom(false);g.innerHTML='';entries.forEach((e,i)=>{const card=createEntryCard(e);card.dataset.entryIndex=String(i);g.appendChild(card)});updatePhotoCount()}
function normalizeNosAfterDelete(){entries.forEach((e,i)=>{e.no=String(i+1)})}
function addEntry(){syncEntriesFromDom();const n=entries.length+1;entries.push({no:String(n),work_type:'',notes:Array(NOTE_LINES).fill(''),image:'',fit:'cover'});renderLedger()}
function addEntryAndScroll(){addEntry();const cards=document.querySelectorAll('.entry-card');cards[cards.length-1]?.scrollIntoView({behavior:'smooth',block:'center'})}
function renumberEntries(){document.querySelectorAll('.entry-card').forEach((c,i)=>{const n=c.querySelector('.no-input');if(n)n.value=String(i+1)});syncEntriesFromDom();statusMsg('No.を振り直しました。')}
function addPhotoTools(box){if(box.querySelector('.photo-tools'))return;const div=document.createElement('div');div.className='photo-tools no-print';div.innerHTML='<button type="button">写真選択</button>';div.querySelector('button').onclick=ev=>{ev.stopPropagation();pickPhotoFromSource(box,'library')};box.appendChild(div)}
function markSelected(box){document.querySelectorAll('.photo-box').forEach(b=>b.classList.remove('is-selected'));selectedPhotoBox=box;box.classList.add('is-selected')}
function pickPhotoFromSource(box,mode){if(!box)box=document.querySelector('.photo-box');markSelected(box);const inp=byId('hiddenPhotoInput');inp.value='';inp.removeAttribute('capture');if(mode==='camera')inp.setAttribute('capture','environment');inp.onchange=()=>{if(inp.files&&inp.files[0])loadImage(inp.files[0],box)};inp.click()}
function openPhotoActionSheet(box){markSelected(box);const old=byId('photoActionSheet');if(old)old.remove();const sheet=document.createElement('div');sheet.id='photoActionSheet';sheet.className='no-print';sheet.style.cssText='position:fixed;left:0;right:0;bottom:0;z-index:90;background:rgba(255,255,255,.98);border-top:1px solid #ccc;padding:12px 12px calc(12px + env(safe-area-inset-bottom));box-shadow:0 -6px 24px rgba(0,0,0,.18);display:grid;gap:8px;';sheet.innerHTML='<button class="primary" style="min-height:52px" id="asCamera">カメラで撮影</button><button style="min-height:52px" id="asLibrary">写真/ファイルから選択</button><button id="asCover">表示：枠いっぱい</button><button id="asContain">表示：全体表示</button><button class="danger" style="min-height:48px" id="asCancel">キャンセル</button>';document.body.appendChild(sheet);byId('asCamera').onclick=()=>{sheet.remove();pickPhotoFromSource(box,'camera')};byId('asLibrary').onclick=()=>{sheet.remove();pickPhotoFromSource(box,'library')};byId('asCover').onclick=()=>{sheet.remove();setBoxFit(box,'cover')};byId('asContain').onclick=()=>{sheet.remove();setBoxFit(box,'contain')};byId('asCancel').onclick=()=>sheet.remove()}
function shootSelected(){pickPhotoFromSource(selectedPhotoBox||document.querySelector('.photo-box'),'camera')}
function chooseSelected(){pickPhotoFromSource(selectedPhotoBox||document.querySelector('.photo-box'),'library')}
function setBoxFit(box,fit){const card=box.closest('.entry-card');card.dataset.fit=fit;const img=box.querySelector('img');if(img)img.style.objectFit=fit;syncEntriesFromDom();statusMsg('表示方法を変更しました。')}
function changeCardFit(sel){const card=sel.closest('.entry-card');const box=card.querySelector('.photo-box');setBoxFit(box,sel.value)}
function loadImage(file,box){const before=file.size;const p=currentPreset();const r=new FileReader();r.onload=()=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height;const ratio=Math.min(1,p.maxW/w,p.maxH/h);w=Math.max(1,Math.round(w*ratio));h=Math.max(1,Math.round(h*ratio));const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;const ctx=canvas.getContext('2d');ctx.drawImage(img,0,0,w,h);const data=canvas.toDataURL('image/jpeg',p.quality);box.innerHTML=imgTag(data,box.closest('.entry-card')?.dataset.fit||'cover');addPhotoTools(box);markSelected(box);syncEntriesFromDom();updatePhotoCount();const after=dataUrlBytes(data);byId('resizeStatus').textContent='取込前 '+formatBytes(before)+' → 取込後 約'+formatBytes(after)+'（'+p.label+'）'};img.onerror=()=>alert('写真を読み込めませんでした。');img.src=r.result};r.readAsDataURL(file)}
function deleteCardPhoto(btn){const card=btn.closest('.entry-card');const box=card?.querySelector('.photo-box');if(!box)return;box.innerHTML=placeholder();addPhotoTools(box);syncEntriesFromDom();updatePhotoCount();statusMsg('選択枠の写真だけ削除しました。')}
function clearCardText(btn){const card=btn.closest('.entry-card');card?.querySelectorAll('.work-input,.note-input').forEach(i=>i.value='');syncEntriesFromDom();statusMsg('選択枠の入力文だけ削除しました。')}
function deleteCard(btn){const card=btn?.closest('.entry-card');if(!card)return;if(!confirm('この写真枠を削除します。よろしいですか？'))return;syncEntriesFromDom();const cards=[...document.querySelectorAll('.entry-card')];const idx=cards.indexOf(card);if(idx<0)return;entries.splice(idx,1);normalizeNosAfterDelete();if(entries.length===0){entries.push({no:'1',work_type:'',notes:Array(NOTE_LINES).fill(''),image:'',fit:'cover'})}selectedPhotoBox=null;renderLedger();statusMsg('写真枠を削除しました。')}
function clearPhotosOnly(){document.querySelectorAll('.photo-box').forEach(box=>{box.innerHTML=placeholder();addPhotoTools(box)});syncEntriesFromDom();updatePhotoCount();statusMsg('写真だけ削除しました。')}
function clearDescriptionsOnly(){document.querySelectorAll('.work-input,.note-input').forEach(i=>i.value='');syncEntriesFromDom();statusMsg('入力文を削除しました。写真とNo.は残しています。')}
function clearPhotosAndDescriptions(){if(!confirm('写真と入力文を全削除します。No.は残します。よろしいですか？'))return;clearPhotosOnly();clearDescriptionsOnly();statusMsg('写真＆入力文を全削除しました。No.は残しています。')}
function openDeleteMenu(){const old=byId('deleteActionSheet');if(old)old.remove();const sheet=document.createElement('div');sheet.id='deleteActionSheet';sheet.className='no-print';sheet.style.cssText='position:fixed;left:0;right:0;bottom:0;z-index:95;background:#fff;border-top:1px solid #ccc;padding:12px 12px calc(12px + env(safe-area-inset-bottom));box-shadow:0 -6px 24px rgba(0,0,0,.18);display:grid;gap:8px;';sheet.innerHTML='<button id="delSelectedPhoto">選択中の写真だけ削除</button><button id="delSelectedText">選択中の入力文だけ削除</button><button class="danger" id="delSelectedCard">選択中の枠を削除</button><button class="danger" id="delAllPhoto">全写真削除</button><button class="danger" id="delAllText">全入力文削除</button><button id="delCancel">キャンセル</button>';document.body.appendChild(sheet);const card=selectedPhotoBox?.closest('.entry-card');byId('delSelectedPhoto').onclick=()=>{sheet.remove();if(card)deleteCardPhoto(card.querySelector('.card-footer button'))};byId('delSelectedText').onclick=()=>{sheet.remove();if(card)clearCardText(card.querySelector('.card-footer button'))};byId('delSelectedCard').onclick=()=>{sheet.remove();if(card)deleteCard(card.querySelector('.card-footer .danger'))};byId('delAllPhoto').onclick=()=>{sheet.remove();if(confirm('全写真を削除しますか？'))clearPhotosOnly()};byId('delAllText').onclick=()=>{sheet.remove();if(confirm('全入力文を削除しますか？'))clearDescriptionsOnly()};byId('delCancel').onclick=()=>sheet.remove()}
function syncEntriesFromDom(readDom=true){const cards=[...document.querySelectorAll('.entry-card')];if(!cards.length&&!readDom)return;entries=cards.map((c,i)=>{const img=c.querySelector('.photo-box img');const notes=[...c.querySelectorAll('.note-input')].map(x=>x.value||'');while(notes.length<NOTE_LINES)notes.push('');return{no:c.querySelector('.no-input')?.value||String(i+1),work_type:c.querySelector('.work-input')?.value||'',notes:notes.slice(0,NOTE_LINES),image:img?img.src:'',fit:c.dataset.fit||'cover'}})}
function entryHasPhoto(e){return !!e.image}
function updatePhotoCount(){const cnt=(entries||[]).filter(entryHasPhoto).length;const pages=Math.ceil(cnt/3);const status=byId('resizeStatus');if(status&&cnt)status.textContent=status.textContent.replace(/　写真.*/,'')+'　写真 '+cnt+'枚 / 写真ページ '+pages+'ページ'}
function statusMsg(msg){const el=byId('resizeStatus');if(el)el.textContent=msg}
function exportJson(){syncEntriesFromDom();const data={cover:getCover(),compression:val('resizePreset')||'middle',entries};const site=(data.cover.siteName||'現場名未入力').replace(/[\\/:*?"<>|\s]+/g,'_');const name=site+'_工事写真台帳_入力データ_'+ymd()+'.json';const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});downloadBlob(blob,name);statusMsg('入力データを保存しました。')}
function normalizeImportEntry(e,i){let notes=Array.isArray(e.notes)?e.notes.slice(0,NOTE_LINES):[e.stage||'',e.location||'',e.content||''];while(notes.length<NOTE_LINES)notes.push('');return{no:e.no||String(i+1),work_type:e.work_type||'',notes,image:e.image||'',fit:e.fit||'cover'}}
function importJson(ev){const f=ev.target.files[0];if(!f)return;if(!confirm('現在の入力内容を読み込むデータで上書きします。よろしいですか？')){ev.target.value='';return}const r=new FileReader();r.onload=()=>{try{const data=JSON.parse(r.result);const c=data.cover||{};const map={siteName:c.siteName||c.project_name||'',workName:c.workName||c.subtitle||'',startDate:c.startDate||c.start||'',finishDate:c.finishDate||c.end||'',contractorName:c.contractorName||c.contractor||'',showContractor:c.showContractor||'yes'};Object.entries(map).forEach(([k,v])=>{const el=byId(k);if(el)el.value=v});if(data.compression&&PRESETS[data.compression])byId('resizePreset').value=data.compression;entries=(data.entries&&data.entries.length?data.entries:entries).map(normalizeImportEntry);renderLedger();renderCoverScreen();updateResizePresetNote();updatePhotoCount();statusMsg('入力データを読み込みました。')}catch(e){alert('入力データを読み込めませんでした: '+(e.message||e))}};r.readAsText(f);ev.target.value=''}
function ymd(){const d=new Date();return d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')}
function downloadBlob(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},600)}
function makePrintEntry(e){const row=document.createElement('div');row.className='print-entry';const photo=document.createElement('div');photo.className='print-photo';const img=document.createElement('img');img.src=e.image;img.style.objectFit=e.fit||'cover';photo.appendChild(img);const info=document.createElement('div');info.className='print-info';const no=document.createElement('div');no.className='print-no';no.textContent='No.　'+(e.no||'');const work=document.createElement('div');work.className='print-work';const lab=document.createElement('div');lab.className='print-work-label';lab.textContent='工種';const wt=document.createElement('div');wt.className='print-work-text';wt.textContent=e.work_type||'';work.appendChild(lab);work.appendChild(wt);info.appendChild(no);info.appendChild(work);for(let i=0;i<NOTE_LINES;i++){const line=document.createElement('div');line.className='print-line';line.textContent=(e.notes&&e.notes[i])||'';info.appendChild(line)}row.appendChild(photo);row.appendChild(info);return row}
function buildPrintPages(){syncEntriesFromDom();const root=byId('printRoot');root.innerHTML='';const cover=document.createElement('div');cover.className='print-page cover-page';cover.innerHTML=coverMarkup(getCover());root.appendChild(cover);const photos=entries.filter(entryHasPhoto);for(let i=0;i<photos.length;i+=3){const page=document.createElement('div');page.className='print-page photo-print-page';photos.slice(i,i+3).forEach(e=>page.appendChild(makePrintEntry(e)));root.appendChild(page)}return photos.length}
function printPdf(){const photoCount=buildPrintPages();if(photoCount===0){if(!confirm('写真が1枚も入っていません。表紙のみでPDF作成しますか？'))return}const photoPages=Math.ceil(photoCount/3);const total=1+photoPages;const site=(val('siteName')||'現場名未入力').replace(/[\\/:*?"<>|\s]+/g,'_');const name=site+'_工事写真台帳_'+ymd();const msg='PDF作成前確認\n\n表紙：1ページ\n写真枚数：'+photoCount+'枚\n写真ページ：'+photoPages+'ページ\n合計：'+total+'ページ\n保存候補名：'+name+'\n\nこの内容でPDF作成しますか？';if(!confirm(msg))return;const oldTitle=document.title;document.title=name;setTimeout(()=>{window.print();setTimeout(()=>{document.title=oldTitle},800)},150)}
updateResizePresetNote();renderLedger();renderCoverScreen();
</script>
</body>
</html>
