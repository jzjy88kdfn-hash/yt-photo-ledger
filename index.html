<style>
:root{--bg:#f4f6f8;--ink:#111827;--muted:#667085;--line:#111;--green:#14532d;--red:#7f1d1d;--paper:#fff;--safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom)}
*{box-sizing:border-box}html{-webkit-text-size-adjust:100%}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Yu Gothic','YuGothic','Hiragino Kaku Gothic ProN',Meiryo,sans-serif;padding-bottom:calc(78px + var(--safe-bottom))}button,input,select{font:inherit;font-size:16px!important;min-height:44px;border-radius:10px}button{border:1px solid #b8bec8;background:#fff;padding:9px 11px;font-weight:700}.primary{background:var(--green)!important;color:#fff!important;border-color:var(--green)!important}.danger{background:var(--red)!important;color:#fff!important;border-color:var(--red)!important}input,select{width:100%;border:1px solid #cfd4dc;padding:9px;background:#fff}label{font-size:12px;color:var(--muted);display:block;margin:0 0 4px}header{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.96);border-bottom:1px solid #ddd;padding:calc(10px + var(--safe-top)) 12px 10px;backdrop-filter:blur(10px)}h1{font-size:19px;line-height:1.25;margin:0;font-weight:800}.sub{font-size:12px;color:var(--muted);line-height:1.45;margin-top:2px}main{max-width:1180px;margin:12px auto;padding:0 10px 110px}.panel{background:#fff;border:1px solid #ddd;border-radius:14px;padding:12px;margin:10px 0;box-shadow:0 1px 2px #0001}.ok{background:#ecfdf5;border-color:#bbf7d0;color:#14532d}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.tabs{display:flex;gap:8px;overflow:auto;padding:6px 0}.tab{white-space:nowrap;border-radius:999px}.tab.active{background:#111;color:#fff}.section{display:none}.section.active{display:block}h2{font-size:18px;margin:0 0 10px}.note{font-size:13px;line-height:1.6;color:#344054}
.cover-preview-wrap{overflow:auto;padding:8px;background:#f8fafc;border-radius:12px}.cover-page{width:210mm;height:297mm;background:var(--paper);margin:0 auto;border:1px solid #d0d5dd;position:relative;padding:24mm 21mm}.cover-inner{height:100%;border:1.4pt solid var(--line);padding:20mm 12mm 12mm;overflow:hidden}.cover-title{text-align:center;font-size:24px;letter-spacing:.32em;font-family:'Yu Mincho','YuMincho','Hiragino Mincho ProN','MS Mincho',serif;font-weight:500;border-bottom:1.4pt solid var(--line);margin:5mm 20mm 18mm;padding-bottom:3mm;white-space:nowrap}.cover-spacer{height:12mm}.cover-row{display:grid;grid-template-columns:38mm minmax(0,1fr);align-items:end;min-height:22mm;font-family:'Yu Mincho','YuMincho','Hiragino Mincho ProN','MS Mincho',serif;font-size:16px;letter-spacing:.16em}.cover-label{padding-left:3mm;white-space:nowrap}.cover-value{border-bottom:1.2pt solid var(--line);min-height:10mm;padding:0 3mm 1.2mm;letter-spacing:.04em;display:flex;align-items:flex-end;line-height:1.18;max-width:100%;overflow:hidden;overflow-wrap:anywhere;word-break:break-word;white-space:normal}.cover-period{display:grid;grid-template-columns:25mm minmax(0,1fr);gap:4mm;align-items:end;width:100%}.cover-sub-label{text-align:center;letter-spacing:.18em;font-size:.9em;padding-top:2.2mm;align-self:end}.cover-contractor{margin-top:22mm}.cover-inner.no-contractor .cover-spacer{height:16mm}.cover-inner.no-contractor .cover-row{min-height:24mm}
.ledger-list{display:grid;gap:12px}.entry-card{background:#fff;border:1px solid #d0d5dd;border-radius:14px;padding:10px;display:grid;grid-template-columns:minmax(280px,1fr) 210px;gap:12px;align-items:stretch}.photo-box{min-height:250px;border:2px dashed #9ca3af;background:#fafafa;display:flex;align-items:center;justify-content:center;text-align:center;color:#667085;position:relative;overflow:hidden;border-radius:10px}.photo-box img{width:100%;height:100%;object-position:center center;display:block}.side-box{border:1.4pt solid var(--line);background:#fff;display:grid;grid-template-rows:42px 46px repeat(5,42px);font-family:'Yu Gothic','YuGothic',Meiryo,sans-serif;overflow:hidden}.side-row{border-bottom:1.1pt solid var(--line);display:grid;align-items:center}.side-row:last-child{border-bottom:0}.side-no{grid-template-columns:54px 1fr}.no-label,.work-label{border-right:1.1pt solid var(--line);padding-left:10px;font-size:17px;height:100%;display:flex;align-items:center}.work-row{grid-template-columns:54px 1fr}.side-box input{border:0;border-radius:0;min-height:0;height:100%;font-size:16px!important;padding:3px 8px}.side-box input.no-input{font-size:20px!important;text-align:center;font-weight:700;padding:0 4px}.note-line{border-bottom:1.1pt dotted #777}.card-footer{grid-column:1/-1;display:grid;grid-template-columns:repeat(6,minmax(95px,1fr));gap:8px;align-items:end}.photo-file label{font-size:12px;color:#344054;font-weight:700;margin-bottom:3px}.photo-file input{font-size:14px!important;min-height:40px;padding:6px;background:#fff}.card-footer button,.card-footer select{font-size:14px!important;min-height:40px;padding:6px 8px}
#printRoot{display:none}.print-page{width:210mm;height:297mm;background:#fff;position:relative;overflow:hidden;page-break-after:always;break-after:page}.print-page:last-child{page-break-after:auto;break-after:auto}.photo-print-page{padding:14mm 14mm 12mm}.print-entry{height:80mm;display:grid;grid-template-columns:1fr 50mm;gap:12mm;align-items:stretch;margin-bottom:9mm}.print-entry:last-child{margin-bottom:0}.print-photo{border:1.4pt solid var(--line);height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#fff}.print-photo img{width:100%;height:100%;object-position:center center;display:block}.print-info{border:1.4pt solid var(--line);height:100%;display:grid;grid-template-rows:11mm 14mm repeat(5,1fr);font-family:'Yu Gothic','YuGothic',Meiryo,sans-serif}.print-no{border-bottom:1.1pt solid var(--line);font-size:16px;padding:1.8mm 4mm}.print-work{border-bottom:1.1pt double var(--line);display:grid;grid-template-columns:14mm 1fr;align-items:center}.print-work-label{font-size:13px;padding-left:3mm;border-right:1.1pt solid var(--line);height:100%;display:flex;align-items:center}.print-work-text{font-size:13px;text-align:center}.print-line{border-bottom:1.1pt dotted #777;display:flex;align-items:center;justify-content:center;text-align:center;font-size:13px;line-height:1.2;padding:0 2mm;white-space:pre-wrap}.print-line:last-child{border-bottom:0}.bottom-bar{position:fixed;left:0;right:0;bottom:0;z-index:60;display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px 10px calc(8px + var(--safe-bottom));background:rgba(255,255,255,.96);border-top:1px solid #d0d5dd;box-shadow:0 -4px 18px rgba(0,0,0,.12);backdrop-filter:blur(10px)}.bottom-bar button{min-height:52px}
@media(max-width:760px){main{max-width:none;margin:8px auto;padding:0 8px 105px}.desktop-only{display:none!important}.grid{grid-template-columns:1fr!important}.panel{padding:10px;margin:8px 0;border-radius:12px}.tabs{position:sticky;top:calc(58px + var(--safe-top));z-index:20;background:var(--bg)}.cover-page{width:100%;height:auto;aspect-ratio:210/297;padding:12px}.cover-inner{padding:22px 12px}.cover-title{font-size:20px;margin:12px 14px 22px;letter-spacing:.22em}.cover-row{font-size:14px;grid-template-columns:76px minmax(0,1fr);min-height:44px}.cover-period{grid-template-columns:54px minmax(0,1fr)}.cover-contractor{margin-top:30px}.entry-card{grid-template-columns:1fr;gap:8px}.photo-box{height:50vh;min-height:280px;max-height:520px}.side-box{grid-template-rows:42px 46px repeat(5,42px)}.card-footer{grid-template-columns:1fr 1fr}.card-footer select{width:100%}}
@media print{@page{size:A4 portrait;margin:10mm 8mm 14mm 8mm}html,body{background:#fff!important;margin:0!important;padding:0!important;width:auto!important;height:auto!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}header,main,.bottom-bar,.no-print{display:none!important}#printRoot{display:block!important;width:100%!important;margin:0!important;padding:0!important}.print-page{width:100%!important;height:205mm!important;min-height:0!important;margin:0 auto!important;padding:0!important;border:0!important;overflow:hidden!important;page-break-after:always;break-after:page}.print-page:last-child{page-break-after:auto!important;break-after:auto!important}.cover-page{width:100%!important;height:205mm!important;aspect-ratio:auto!important;padding:4mm 7mm!important;background:#fff!important}.cover-inner{height:100%!important;padding:11mm 9mm 8mm!important}.cover-title{font-size:17px!important;margin:3mm 16mm 11mm!important;padding-bottom:3mm!important}.cover-spacer{height:8mm!important}.cover-row{font-size:11.5px!important;min-height:15mm!important;grid-template-columns:24mm minmax(0,1fr)!important}.cover-value{min-height:7mm!important}.cover-period{grid-template-columns:17mm minmax(0,1fr)!important}.cover-contractor{margin-top:10mm!important}.photo-print-page{height:205mm!important;padding:5mm 6mm!important}.print-entry{height:58mm!important;grid-template-columns:1fr 42mm!important;gap:6mm!important;margin-bottom:5mm!important}.print-photo{height:100%!important}.print-info{grid-template-rows:8mm 10mm repeat(5,1fr)!important}.print-no{font-size:11px!important;padding:1mm 2.2mm!important}.print-work{grid-template-columns:10mm 1fr!important}.print-work-label,.print-work-text,.print-line{font-size:9.5px!important}.print-line{padding:0 1mm!important}}
</style>
</head>
<body>
<header class="no-print"><h1>Yamazaki-Tosou 工事写真台帳</h1><div class="sub">表紙を入力し、写真を貼り付けてPDF保存できます。</div><div class="toolbar desktop-only"><button class="primary" data-global="pdf">PDF作成</button><button data-global="save">入力データ保存</button><label class="filebtn">入力データ読込<input id="jsonInput" type="file" accept="application/json"></label><button data-global="add">写真枠追加</button></div></header>
<main><div class="panel ok no-print"><b>使い方:</b> 表紙入力 → 写真追加 → 工種・コメント入力 → PDF作成。写真は各枠下の純正ファイル選択欄から追加します。</div><div class="panel no-print"><h2>写真圧縮設定</h2><div class="grid"><div><label>圧縮</label><select id="resizePreset"><option value="strong">大：強く圧縮・軽量（約80〜180KB/枚）</option><option value="middle" selected>中：標準（約150〜350KB/枚）</option><option value="light">小：軽く圧縮・画質優先（約300〜700KB/枚）</option></select></div></div><div id="status" class="note"></div></div><div class="tabs no-print"><button class="tab active" data-section="cover">表紙入力</button><button class="tab" data-section="ledger">写真台帳</button><button class="tab" data-section="help">使い方</button></div>
<section id="cover" class="section active"><div class="panel no-print"><h2>表紙入力</h2><div class="grid"><div><label>現場名</label><input id="siteName" placeholder="例：〇〇マンション外壁改修工事"></div><div><label>工事名</label><input id="workName" value="塗装工事"></div><div><label>施工者</label><input id="contractorName" placeholder="例：山﨑塗装"></div><div><label>着工</label><input id="startDate" placeholder="例：令和8年6月1日"></div><div><label>竣工</label><input id="finishDate" placeholder="例：令和8年6月30日"></div><div><label>施工者を表紙に表示</label><select id="showContractor"><option value="yes">表示する</option><option value="no">表示しない</option></select></div></div></div><div class="cover-preview-wrap"><div id="coverPreview" class="cover-page"></div></div></section>
<section id="ledger" class="section"><div class="panel no-print"><div class="toolbar"><button class="primary" data-global="add">写真枠追加</button><button data-global="renumber">No.振り直し</button></div></div><div id="ledgerList" class="ledger-list"></div></section><section id="help" class="section"><div class="panel"><h2>使い方</h2><p class="note">PDFで白紙ページが入らないよう、印刷時だけさらに小さい安全寸法で出力するよう再調整済みです。</p></div></section></main>
<div class="bottom-bar no-print"><button class="primary" data-global="add">枠追加</button><button class="primary" data-global="pdf">PDF</button></div><div id="printRoot"></div>
<script>
const NOTE_LINES=5,PRESETS={strong:{label:'大（強く圧縮・軽量）',maxW:1000,maxH:1000,quality:.68,guide:'約80〜180KB/枚'},middle:{label:'中（標準）',maxW:1400,maxH:1400,quality:.78,guide:'約150〜350KB/枚'},light:{label:'小（軽く圧縮・画質優先）',maxW:1800,maxH:1800,quality:.86,guide:'約300〜700KB/枚'}};let entries=[1,2,3].map(n=>({no:String(n),work_type:'',notes:Array(NOTE_LINES).fill(''),image:'',fit:'cover'}));const $=id=>document.getElementById(id),v=id=>$(id)?.value||'',esc=s=>String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
function status(m){$('status').textContent=m}function ymd(){const d=new Date();return d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')}function bytes(n){const kb=n/1024;return kb<1024?Math.round(kb)+'KB':(kb/1024).toFixed(1)+'MB'}function dataBytes(d){const b=d.split(',')[1]||'';return Math.round(b.length*3/4)}function preset(){return PRESETS[v('resizePreset')||'middle']||PRESETS.middle}function updatePreset(){const p=preset();status('現在：'+p.label+'　目安 '+p.guide+'。写真の内容により前後します。')}
function getCover(){return{siteName:v('siteName'),workName:v('workName'),startDate:v('startDate'),finishDate:v('finishDate'),contractorName:v('contractorName'),showContractor:v('showContractor')}}function coverHtml(c){const show=c.showContractor!=='no';return `<div class="cover-inner ${show?'':'no-contractor'}"><div class="cover-title">工事写真帳</div><div class="cover-spacer"></div><div class="cover-row"><div class="cover-label">現場名</div><div class="cover-value">${esc(c.siteName)}</div></div><div class="cover-row"><div class="cover-label">工事名</div><div class="cover-value">${esc(c.workName)}</div></div><div class="cover-row"><div class="cover-label">工　期</div><div class="cover-value"><div style="width:100%"><div class="cover-period"><div class="cover-sub-label">着工</div><div>${esc(c.startDate)}</div></div><div class="cover-period"><div class="cover-sub-label">竣工</div><div>${esc(c.finishDate)}</div></div></div></div></div>${show?`<div class="cover-row cover-contractor"><div class="cover-label">施工者</div><div class="cover-value">${esc(c.contractorName)}</div></div>`:''}</div>`}function renderCover(){$('coverPreview').innerHTML=coverHtml(getCover())}
function placeholder(){return '<div>下のファイル選択から写真追加</div>'}function imgTag(src,fit){return `<img src="${src}" style="object-fit:${fit||'cover'}">`}function sync(){entries=[...document.querySelectorAll('.entry-card')].map((c,i)=>{const img=c.querySelector('.photo-box img'),notes=[...c.querySelectorAll('.note-input')].map(x=>x.value||'');while(notes.length<NOTE_LINES)notes.push('');return{no:c.querySelector('.no-input')?.value||String(i+1),work_type:c.querySelector('.work-input')?.value||'',notes:notes.slice(0,NOTE_LINES),image:img?img.src:'',fit:c.dataset.fit||'cover'}})}function syncSafe(){if(document.querySelectorAll('.entry-card').length)sync()}
function side(e){let ns='';for(let i=0;i<NOTE_LINES;i++)ns+=`<div class="side-row note-line"><input class="note-input" value="${esc((e.notes||[])[i]||'')}" placeholder="自由入力"></div>`;return `<div class="side-box"><div class="side-row side-no"><div class="no-label">No.</div><input class="no-input" value="${esc(e.no||'')}"></div><div class="side-row work-row"><div class="work-label">工種</div><input class="work-input" value="${esc(e.work_type||'')}"></div>${ns}</div>`}function card(e,i){return `<div class="entry-card" data-index="${i}" data-fit="${e.fit||'cover'}"><div class="photo-box">${e.image?imgTag(e.image,e.fit||'cover'):placeholder()}</div>${side(e)}<div class="card-footer no-print"><div class="photo-file"><label>写真追加</label><input class="photo-input" type="file" accept="image/*" data-index="${i}"></div><div class="photo-file"><label>カメラ</label><input class="photo-input" type="file" accept="image/*" capture="environment" data-index="${i}"></div><button data-action="delphoto" data-index="${i}">写真削除</button><button data-action="delcomment" data-index="${i}">コメント削除</button><button class="danger" data-action="delcard" data-index="${i}">枠削除</button><select data-action="fit" data-index="${i}"><option value="cover" ${(e.fit||'cover')==='cover'?'selected':''}>枠いっぱい</option><option value="contain" ${(e.fit||'cover')==='contain'?'selected':''}>全体表示</option></select></div></div>`}
function renderLedger(){$('ledgerList').innerHTML=entries.map(card).join('');updateCount()}function addEntry(){syncSafe();entries.push({no:String(entries.length+1),work_type:'',notes:Array(NOTE_LINES).fill(''),image:'',fit:'cover'});renderLedger();setTimeout(()=>document.querySelectorAll('.entry-card')[entries.length-1]?.scrollIntoView({behavior:'smooth',block:'center'}),30)}function renumber(){syncSafe();entries.forEach((e,i)=>e.no=String(i+1));renderLedger();status('No.を振り直しました。')}function updateCount(){const c=entries.filter(e=>e.image).length;if(c)status('写真 '+c+'枚 / 写真ページ '+Math.ceil(c/3)+'ページ')}
function loadImage(file,i){syncSafe();const p=preset(),before=file.size,r=new FileReader();r.onload=()=>{const im=new Image();im.onload=()=>{let w=im.width,h=im.height,ra=Math.min(1,p.maxW/w,p.maxH/h);w=Math.max(1,Math.round(w*ra));h=Math.max(1,Math.round(h*ra));const ca=document.createElement('canvas');ca.width=w;ca.height=h;ca.getContext('2d').drawImage(im,0,0,w,h);const data=ca.toDataURL('image/jpeg',p.quality);entries[i].image=data;renderLedger();status('取込前 '+bytes(before)+' → 取込後 約'+bytes(dataBytes(data))+'（'+p.label+'）')};im.onerror=()=>alert('写真を読み込めませんでした。');im.src=r.result};r.readAsDataURL(file)}function delPhoto(i){syncSafe();entries[i].image='';renderLedger();status('写真を削除しました。')}function delComment(i){syncSafe();entries[i].notes=Array(NOTE_LINES).fill('');renderLedger();status('コメントを削除しました。')}function delCard(i){syncSafe();if(!confirm('この写真枠を削除します。よろしいですか？'))return;entries.splice(Number(i),1);if(entries.length===0)entries.push({no:'1',work_type:'',notes:Array(NOTE_LINES).fill(''),image:'',fit:'cover'});entries.forEach((e,j)=>e.no=String(j+1));renderLedger();status('枠を削除しました。')}function setFit(i,fit){syncSafe();entries[i].fit=fit;renderLedger();status('表示方法を変更しました。')}
function exportJson(){syncSafe();const data={cover:getCover(),compression:v('resizePreset')||'middle',entries};const site=(data.cover.siteName||'現場名未入力').replace(/[\\/:*?"<>|\s]+/g,'_');download(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),site+'_工事写真台帳_入力データ_'+ymd()+'.json');status('入力データを保存しました。')}function download(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},600)}function importJson(ev){const f=ev.target.files[0];if(!f)return;if(!confirm('現在の入力内容を読み込むデータで上書きします。よろしいですか？'))return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result),c=d.cover||{};['siteName','workName','startDate','finishDate','contractorName','showContractor'].forEach(k=>{if($(k))$(k).value=c[k]||''});if(d.compression&&PRESETS[d.compression])$('resizePreset').value=d.compression;entries=(Array.isArray(d.entries)&&d.entries.length?d.entries:entries).map((e,i)=>{let n=Array.isArray(e.notes)?e.notes.slice(0,NOTE_LINES):[];while(n.length<NOTE_LINES)n.push('');return{no:e.no||String(i+1),work_type:e.work_type||'',notes:n,image:e.image||'',fit:e.fit||'cover'}});renderLedger();renderCover();updatePreset();status('入力データを読み込みました。')}catch(e){alert('入力データを読み込めませんでした: '+(e.message||e))}};r.readAsText(f);ev.target.value=''}
function printEntry(e){const row=document.createElement('div');row.className='print-entry';const ph=document.createElement('div');ph.className='print-photo';ph.innerHTML=imgTag(e.image,e.fit||'cover');const info=document.createElement('div');info.className='print-info';info.innerHTML=`<div class="print-no">No.　${esc(e.no)}</div><div class="print-work"><div class="print-work-label">工種</div><div class="print-work-text">${esc(e.work_type)}</div></div>`;for(let i=0;i<NOTE_LINES;i++){const line=document.createElement('div');line.className='print-line';line.textContent=(e.notes&&e.notes[i])||'';info.appendChild(line)}row.appendChild(ph);row.appendChild(info);return row}function buildPrint(){syncSafe();const root=$('printRoot');root.innerHTML='';const cover=document.createElement('div');cover.className='print-page cover-page';cover.innerHTML=coverHtml(getCover());root.appendChild(cover);const photos=entries.filter(e=>e.image);for(let i=0;i<photos.length;i+=3){const page=document.createElement('div');page.className='print-page photo-print-page';photos.slice(i,i+3).forEach(e=>page.appendChild(printEntry(e)));root.appendChild(page)}return photos.length}function printPdf(){const pc=buildPrint();if(pc===0&&!confirm('写真が1枚も入っていません。表紙のみでPDF作成しますか？'))return;const pp=Math.ceil(pc/3),total=1+pp,site=(v('siteName')||'現場名未入力').replace(/[\\/:*?"<>|\s]+/g,'_'),name=site+'_工事写真台帳_'+ymd();const msg=`PDF作成前確認

表紙：1ページ
写真枚数：${pc}枚
写真ページ：${pp}ページ
合計：${total}ページ
